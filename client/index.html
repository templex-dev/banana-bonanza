<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Banana Bonanza 🍌 (Alpha)</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="ui">
    <!-- Party System (no walking) -->
    <div id="party-panel" class="panel">
      <h1>🍌 Banana Bonanza</h1>
      <div class="row">
        <label class="lbl">Your name</label>
        <input id="nameInput" placeholder="Capuchin-42" maxlength="16" />
      </div>
      <div class="row">
        <label class="lbl">Mode</label>
        <div class="modes">
          <label class="mode">
            <input type="radio" name="mode" value="gorilla" checked />
            <span>Gorilla Guard</span>
          </label>
          <label class="mode">
            <input type="radio" name="mode" value="competitive" />
            <span>Competitive</span>
          </label>
        </div>
      </div>
      <div class="row">
        <button id="btnCreate" class="primary">Create Party</button>
        <button id="btnSolo" class="ghost">Start Solo vs Bots</button>
      </div>
      <p class="small">
        Controls: WASD move • E (hold) grab/bank • Space tackle • Q bait banana
      </p>
    </div>

    <!-- Invite bar -->
    <div id="invite" class="panel slim hidden">
      <div class="invite-row">
        <b>Invite link:</b>
        <input id="inviteLink" readonly />
        <button id="btnCopy" class="copy">Copy</button>
      </div>
      <div class="small">Share this with a friend. When they click, they join your party instantly.</div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div id="timer" class="pixel">3:00</div>
      <div id="score" class="pixel">0</div>
      <div id="target" class="pixel small">Target: 50</div>
      <div id="pile" class="pixel small hidden">Center: 0</div>
      <div id="status" class="pixel small"></div>
    </div>
  </div>

  <canvas id="game" width="960" height="576"></canvas>

  <script src="./main.js"></script>
</body>
</html>
